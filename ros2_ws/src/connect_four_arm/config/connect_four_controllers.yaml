# connect_four_controllers.yaml
#
# ros2_control controller configuration for the Connect Four simulation.
# Extends ur_simulation_gz/config/ur_controllers.yaml with a gripper controller.
#
# Passed as controllers_file (→ simulation_controllers xacro arg → Gazebo plugin).

controller_manager:
  ros__parameters:
    update_rate: 250  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # UR-specific controllers (kept for compatibility; not used in simulation)
    io_and_status_controller:
      type: ur_controllers/GPIOController

    speed_scaling_state_broadcaster:
      type: ur_controllers/SpeedScalingStateBroadcaster

    scaled_joint_trajectory_controller:
      type: ur_controllers/ScaledJointTrajectoryController

    forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    forward_position_controller:
      type: position_controllers/JointGroupPositionController


# ── Arm trajectory controller ──────────────────────────────────────────────
joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      shoulder_pan_joint:  { trajectory: 0.0, goal: 0.1 }
      shoulder_lift_joint: { trajectory: 0.0, goal: 0.1 }
      elbow_joint:         { trajectory: 0.0, goal: 0.1 }
      wrist_1_joint:       { trajectory: 0.0, goal: 0.1 }
      wrist_2_joint:       { trajectory: 0.0, goal: 0.1 }
      wrist_3_joint:       { trajectory: 0.0, goal: 0.1 }


# ── Gripper trajectory controller ─────────────────────────────────────────
# Controls robotiq_85_left_knuckle_joint (0.0 = open, 0.8 = fully closed).
# The five mimic joints are driven by gz_ros2_control automatically.
gripper_controller:
  ros__parameters:
    joints:
      - robotiq_85_left_knuckle_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 10.0
      robotiq_85_left_knuckle_joint: { trajectory: 0.0, goal: 0.05 }


# ── Kept for compatibility ─────────────────────────────────────────────────
scaled_joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    speed_scaling_interface_name: ""
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0

forward_velocity_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    interface_name: velocity

forward_position_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

speed_scaling_state_broadcaster:
  ros__parameters:
    state_publish_rate: 100.0

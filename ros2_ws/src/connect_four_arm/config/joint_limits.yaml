# Joint limits for MoveIt planning (Pilz reads robot_description_planning namespace).
# ur_moveit_config only sets max_acceleration; max_velocity must be added here
# or Pilz reads NaN and generates near-zero-speed trajectories.
joint_limits:
  shoulder_pan_joint:
    has_velocity_limits: true
    max_velocity: 3.14159   # 180 deg/s from UR5e spec
    has_acceleration_limits: true
    max_acceleration: 5.0
  shoulder_lift_joint:
    has_velocity_limits: true
    max_velocity: 3.14159
    has_acceleration_limits: true
    max_acceleration: 5.0
  elbow_joint:
    has_velocity_limits: true
    max_velocity: 3.14159
    has_acceleration_limits: true
    max_acceleration: 5.0
  wrist_1_joint:
    has_velocity_limits: true
    max_velocity: 3.14159
    has_acceleration_limits: true
    max_acceleration: 5.0
  wrist_2_joint:
    has_velocity_limits: true
    max_velocity: 3.14159
    has_acceleration_limits: true
    max_acceleration: 5.0
  wrist_3_joint:
    has_velocity_limits: true
    max_velocity: 3.14159
    has_acceleration_limits: true
    max_acceleration: 5.0
